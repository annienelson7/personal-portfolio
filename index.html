<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annie Nelson's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>Annie Nelson's Portfolio</h1>
    </header>

    <div class="socials">
        <h2>Connect With Me</h2>
        <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
        <a href="https://github.com" target="_blank">GitHub</a>
    </div>

    <div class="bio">
        <img src="portrait.jpg" alt="Professional picture">
        <div class="bio-text">
            <p>
                something super cool about me that is super interesting.
            </p>
        </div>
    </div>

    <div class="projects">
        <h2>Projects</h2>
    </div>

    <div class="contact">
        <h2>Contact Me</h2>
        <form>
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName">

            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName">

            <label for="email">Email:</label>
            <input type="text" id="email" name="email">

            <label for="message">Message:</label>
            <textarea id="message" name="message" placeholder="Enter your message here..."></textarea>

            <label for="messageType">Type of Message:</label>
            <select id="messageType" name="messageType">
                <option value="business">Business Inquiry</option>
                <option value="feedback">Feedback</option>
                <option value="general">General Questions</option>
            </select>

            <button type="submit">Contact Me</button>
        </form>
    </div>
    </main>

    <footer>
        <p> &copy;2024 Annie Nelson. All rights reserved.</p>
    </footer>

    <script src="index.js"></script>
</body>

</html>
